syntax = "proto3";
package containerd.types;

option go_package = "github.com/containerd/containerd/api/types;types";

// Mount describes mounts for a container (matches containerd API; field numbers must match the daemon).
// Upstream added `target` at 3 and moved `options` to 4 — older protos decode options wrong and break overlay.
message Mount {
  string type = 1;
  string source = 2;
  string target = 3;
  repeated string options = 4;
}
