syntax = "proto3";
package containerd.services.tasks.v1;

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "containerd/types/mount.proto";
import "containerd/types/metrics.proto";
import "containerd/types/descriptor.proto";
import "containerd/types/task/task.proto";

option go_package = "github.com/containerd/containerd/api/services/tasks/v1;tasks";

service Tasks {
  rpc Create(CreateTaskRequest) returns (CreateTaskResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Delete(DeleteTaskRequest) returns (DeleteResponse);
  rpc DeleteProcess(DeleteProcessRequest) returns (DeleteResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListTasksRequest) returns (ListTasksResponse);
  rpc Kill(KillRequest) returns (google.protobuf.Empty);
  rpc Exec(ExecProcessRequest) returns (google.protobuf.Empty);
  rpc ResizePty(ResizePtyRequest) returns (google.protobuf.Empty);
  rpc Pause(PauseTaskRequest) returns (google.protobuf.Empty);
  rpc Resume(ResumeTaskRequest) returns (google.protobuf.Empty);
  rpc ListPids(ListPidsRequest) returns (ListPidsResponse);
  rpc Checkpoint(CheckpointTaskRequest) returns (CheckpointTaskResponse);
  rpc Wait(WaitRequest) returns (WaitResponse);
  rpc Metrics(MetricsRequest) returns (MetricsResponse);
}

message CreateTaskRequest {
  string container_id = 1;
  repeated containerd.types.Mount rootfs = 3;
  string stdin = 4;
  string stdout = 5;
  string stderr = 6;
  bool terminal = 7;
  google.protobuf.Any checkpoint = 8;
  google.protobuf.Any options = 9;
  string runtime_path = 10;
}

message CreateTaskResponse {
  string container_id = 1;
  uint32 pid = 2;
}

message StartRequest { string container_id = 1; string exec_id = 2; }
message StartResponse { uint32 pid = 1; }

message DeleteTaskRequest { string container_id = 1; }
message DeleteProcessRequest { string container_id = 1; string exec_id = 2; }

message DeleteResponse {
  string id = 1;
  uint32 pid = 2;
  uint32 exit_status = 3;
  google.protobuf.Timestamp exited_at = 4;
}

message GetRequest { string container_id = 1; string exec_id = 2; }
message GetResponse { Process process = 1; }

message Process {
  string container_id = 1;
  string id = 2;
  uint32 pid = 3;
  containerd.types.task.Status status = 4;
  string stdin = 5;
  string stdout = 6;
  string stderr = 7;
  bool terminal = 8;
  uint32 exit_status = 9;
  google.protobuf.Timestamp exited_at = 10;
}

message ListTasksRequest { string filter = 1; }
message ListTasksResponse { repeated Process tasks = 1; }

message KillRequest {
  string container_id = 1;
  string exec_id = 2;
  uint32 signal = 3;
  bool all = 4;
}

message ExecProcessRequest {
  string container_id = 1;
  string stdin = 2;
  string stdout = 3;
  string stderr = 4;
  bool terminal = 5;
  google.protobuf.Any spec = 6;
  string exec_id = 7;
}

message ResizePtyRequest {
  string container_id = 1;
  string exec_id = 2;
  uint32 width = 3;
  uint32 height = 4;
}

message PauseTaskRequest { string container_id = 1; }
message ResumeTaskRequest { string container_id = 1; }

message ListPidsRequest { string container_id = 1; }
message ListPidsResponse { repeated ProcessInfo processes = 1; }
message ProcessInfo {
  uint32 pid = 1;
  google.protobuf.Any info = 2;
}

message CheckpointTaskRequest {
  string container_id = 1;
  string parent_checkpoint = 2;
  google.protobuf.Any options = 3;
}
message CheckpointTaskResponse {
  repeated containerd.types.Descriptor descriptors = 1;
}

message WaitRequest { string container_id = 1; string exec_id = 2; }
message WaitResponse {
  uint32 exit_status = 1;
  google.protobuf.Timestamp exited_at = 2;
}

message MetricsRequest { repeated string filters = 1; }
message MetricsResponse { repeated containerd.types.Metric metrics = 1; }
