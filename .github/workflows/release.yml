name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Derive version + assert package.json sync
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            echo "ERROR: tag '$TAG' does not start with v"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Tag is prerelease iff it carries a hyphen segment (e.g. v1.0.6-rc.1).
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          for f in package.json backend/package.json frontend/package.json; do
            PKG_VER="$(node -p "require('./$f').version")"
            if [[ "$PKG_VER" != "$VERSION" ]]; then
              echo "ERROR: $f version ($PKG_VER) does not match tag ($VERSION)."
              exit 1
            fi
          done
          echo "All package.json versions match $VERSION"

      - name: Install backend deps (production only, used inside the tarball)
        working-directory: backend
        run: npm ci --omit=dev --omit=optional

      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Stage release tree
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="dist/wisp"
          rm -rf dist
          mkdir -p "$STAGE"

          # Copy app payload. The release tarball is a "ready to install" tree:
          #  - backend/ source (no node_modules — install.sh / wisp-update will run npm ci on the target)
          #  - frontend/ with prebuilt dist/ (frontend/node_modules excluded)
          #  - scripts/, systemd/, config/, docs/
          rsync -a \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.pids' \
            --exclude '.logs' \
            --exclude 'dist' \
            --exclude 'reports' \
            --exclude 'screenshots' \
            --exclude 'web' \
            --exclude '.github' \
            backend/ "$STAGE/backend/"

          # Frontend: include built dist + the runtime server.js + minimal package.json
          # + lockfile (server.js has runtime deps installed via npm ci on the target),
          # but NOT source / node_modules / vite config — the target never builds.
          mkdir -p "$STAGE/frontend"
          cp -r frontend/dist "$STAGE/frontend/dist"
          cp frontend/server.js "$STAGE/frontend/server.js"
          cp frontend/package.json "$STAGE/frontend/package.json"
          cp frontend/package-lock.json "$STAGE/frontend/package-lock.json"
          if [[ -d frontend/public/vendor/novnc ]]; then
            mkdir -p "$STAGE/frontend/public/vendor"
            cp -r frontend/public/vendor/novnc "$STAGE/frontend/public/vendor/novnc"
          fi

          # Top-level non-build assets
          for d in scripts systemd config docs; do
            rsync -a "$d/" "$STAGE/$d/"
          done
          for f in package.json CHANGELOG.md LICENSE README.md CLAUDE.md; do
            [[ -f "$f" ]] && cp "$f" "$STAGE/$f"
          done

          # Sanity: dist/index.html must be present (proves prebuilt frontend is in)
          test -f "$STAGE/frontend/dist/index.html"

          echo "Staged tree size:"
          du -sh "$STAGE"

      - name: Create tarball + sha256
        id: pack
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          ARCHIVE="wisp-$VERSION.tar.gz"
          tar -czf "$ARCHIVE" -C dist wisp
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE" "$ARCHIVE.sha256"

      - name: Extract release notes from CHANGELOG
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          # Pull lines between the "## YYYY-MM-DD (<tag>)" heading for this
          # version and the next "## " heading. Falls back to a one-line note
          # if the section can't be located so the release still publishes.
          node > release-notes.md <<'EOF'
          const fs = require('node:fs');
          const tag = process.env.TAG;
          const src = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
          const escTag = tag.replace(/\./g, '\\.');
          const startRe = new RegExp('^##\\s+\\d{4}-\\d{2}-\\d{2}\\s+\\(' + escTag + '\\)\\s*$');
          let start = -1;
          for (let i = 0; i < src.length; i++) {
            if (startRe.test(src[i])) { start = i + 1; break; }
          }
          if (start === -1) {
            console.log(`Wisp ${tag}\n`);
            process.exit(0);
          }
          let end = src.length;
          for (let j = start; j < src.length; j++) {
            if (/^##\s+/.test(src[j])) { end = j; break; }
          }
          const body = src.slice(start, end).join('\n').trim();
          console.log(body || `Wisp ${tag}`);
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARGS=(
            "${{ steps.ver.outputs.tag }}"
            --title "${{ steps.ver.outputs.tag }}"
            --notes-file release-notes.md
            "${{ steps.pack.outputs.archive }}"
            "${{ steps.pack.outputs.sha256 }}"
          )
          if [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]]; then
            ARGS+=( --prerelease )
          fi
          gh release create "${ARGS[@]}"
