# Example: serve the static marketing page with nginx.
# Adjust root to your deploy path (e.g. /var/www/wisp-marketing).
server {
    listen 80;
    server_name _;

    root /path/to/wisp/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets
    location ~* \.(css|js|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
